<!DOCTYPE html><html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Roboto', sans-serif; background-color: #111827; }
    .gradient-btn { background-image: linear-gradient(to right, #f87171, #ef4444, #dc2626); transition: all 0.3s ease; }
    .gradient-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3); }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #ef4444; cursor: pointer; margin-top: -6px; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #4b5563; border-radius: 5px; }
    .glow-card { background-color: #1e293b; border: 1px solid #334155; box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .glow-card:hover { transform: translateY(-4px); box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
  </style>
</head>
<body class="text-white p-6">
  <div class="max-w-2xl mx-auto">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h2 class="text-4xl font-bold">Admin Panel</h2>
        <p class="text-gray-400 mt-1">Add a new sensitivity setting</p>
        <p class="text-red-400 font-semibold text-sm">Macro Sensi Admin Panel</p>
      </div>
      <button id="requestBtn" class="gradient-btn text-white px-4 py-2 rounded-lg text-sm font-semibold hover:shadow-lg">
        <i class="fa-solid fa-paper-plane mr-1"></i>Request
      </button>
    </div>
    <form id="upload-form" class="bg-gray-800 p-6 sm:p-8 rounded-2xl shadow-lg space-y-6 border border-gray-700">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div><label class="block text-sm font-medium text-gray-300 mb-1">Player Name</label><input type="text" id="name" placeholder="e.g., Raistar" required class="w-full bg-gray-700 rounded-lg px-4 py-2" /></div>
        <div><label class="block text-sm font-medium text-gray-300 mb-1">Image/Logo URL</label><input type="url" id="logoUrl" placeholder="https://i.ibb.co/..." required class="w-full bg-gray-700 rounded-lg px-4 py-2" /></div>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div><label class="block text-sm font-medium text-gray-300 mb-1">Device Name</label><input type="text" id="deviceName" placeholder="e.g., iPhone 13 Pro Max" required class="w-full bg-gray-700 rounded-lg px-4 py-2" /></div>
        <div><label class="block text-sm font-medium text-gray-300 mb-1">DPI</label><input type="number" id="dpi" placeholder="e.g., 450" required class="w-full bg-gray-700 rounded-lg px-4 py-2" /></div>
      </div>
      <div class="space-y-4 pt-4 border-t border-gray-700">
        <div><label class="flex justify-between text-gray-300">General <span id="general-value">85</span></label><input type="range" id="general" min="0" max="200" value="85" class="w-full" /></div>
        <div><label class="flex justify-between text-gray-300">Red Dot <span id="redDot-value">88</span></label><input type="range" id="redDot" min="0" max="200" value="88" class="w-full" /></div>
        <div><label class="flex justify-between text-gray-300">2x Scope <span id="scope2x-value">80</span></label><input type="range" id="scope2x" min="0" max="200" value="80" class="w-full" /></div>
        <div><label class="flex justify-between text-gray-300">4x Scope <span id="scope4x-value">70</span></label><input type="range" id="scope4x" min="0" max="200" value="70" class="w-full" /></div>
        <div><label class="flex justify-between text-gray-300">Sniper Scope <span id="sniperScope-value">60</span></label><input type="range" id="sniperScope" min="0" max="200" value="60" class="w-full" /></div>
        <div><label class="flex justify-between text-gray-300">Free Look <span id="freeLook-value">50</span></label><input type="range" id="freeLook" min="0" max="200" value="50" class="w-full" /></div>
      </div>
      <button type="submit" id="upload-btn" class="w-full gradient-btn text-white font-bold py-3 px-4 rounded-lg mt-4 text-lg">
        <i class="fa-solid fa-cloud-arrow-up mr-2"></i>Upload Setting
      </button>
    </form>
    <div class="mt-12">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold">Manage Uploaded Sensi</h2>
        <p class="text-gray-400 mt-2">Search and delete existing sensitivity settings.</p>
      </div>
      <div class="bg-gray-800 p-6 sm:p-8 rounded-2xl shadow-lg border border-gray-700">
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-300 mb-2">Search</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
            </div>
            <input type="text" id="search" placeholder="Search..." class="w-full bg-gray-700 rounded-lg pl-10 pr-4 py-2" />
          </div>
        </div>
        <div id="sensi-list" class="space-y-4">
          <p class="text-center text-gray-500">Loading sensitivities...</p>
        </div>
      </div>
    </div>
  </div>  <div id="requestModal" class="fixed inset-0 bg-black bg-opacity-70 z-50 hidden flex items-center justify-center">
    <div class="bg-gray-900 rounded-xl shadow-2xl w-full max-w-6xl p-6 relative overflow-y-auto max-h-[90vh] border border-gray-700">
      <button onclick="closeRequestModal()" class="absolute top-4 right-4 text-gray-300 hover:text-white text-2xl">&times;</button>
      <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-red-500 drop-shadow-lg"><i class="fa-solid fa-inbox"></i> Sensi Requests Panel</h1>
        <p class="text-gray-400 mt-2">Manage all user-submitted sensi requests below.</p>
      </div>
      <div id="request-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="text-center col-span-full" id="loading">
          <i class="fas fa-spinner fa-spin text-red-500 text-3xl"></i>
          <p class="text-gray-400 mt-2">Loading requests...</p>
        </div>
      </div>
    </div>
  </div>  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>  <script>
    const firebaseConfig = {
  apiKey: "AIzaSyDiGg0Ulp7d_QXP8Fvc-S2QSKPm__b2zlo",
            authDomain: "https://yell-18231-default-rtdb.firebaseio.com",
            projectId: "yell-18231",
            storageBucket: "yell-18231.firebasestorage.app",
            messagingSenderId: "758783256385",
            appId: "1:758783256385:web:a4bb9064498d1cd94763c0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const sensitivitiesCollection = db.collection('sensitivities');

    const sliders = ['general', 'redDot', 'scope2x', 'scope4x', 'sniperScope', 'freeLook'];
    sliders.forEach(id => {
      const slider = document.getElementById(id);
      const valueDisplay = document.getElementById(`${id}-value`);
      slider.addEventListener('input', () => valueDisplay.textContent = slider.value);
    });

    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('upload-btn');
      btn.disabled = true;
      btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i>Uploading...`;

      const data = {
        name: document.getElementById('name').value,
        logoUrl: document.getElementById('logoUrl').value,
        deviceName: document.getElementById('deviceName').value,
        dpi: parseInt(document.getElementById('dpi').value),
        general: parseInt(document.getElementById('general').value),
        redDot: parseInt(document.getElementById('redDot').value),
        scope2x: parseInt(document.getElementById('scope2x').value),
        scope4x: parseInt(document.getElementById('scope4x').value),
        sniperScope: parseInt(document.getElementById('sniperScope').value),
        freeLook: parseInt(document.getElementById('freeLook').value),
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        await sensitivitiesCollection.add(data);
        alert('✅ Sensi Uploaded Successfully!');
        e.target.reset();
        sliders.forEach(id => {
          const slider = document.getElementById(id);
          document.getElementById(`${id}-value`).textContent = slider.defaultValue;
          slider.value = slider.defaultValue;
        });
      } catch (err) {
        console.error(err);
        alert('❌ Error uploading data.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-2"></i>Upload Setting`;
      }
    });

    const sensiList = document.getElementById('sensi-list');
    const renderSensiList = (docs) => {
      if (docs.length === 0) {
        sensiList.innerHTML = '<p class="text-center text-gray-500">No sensitivities uploaded yet.</p>';
        return;
      }
      sensiList.innerHTML = '';
      docs.forEach(doc => {
        const data = doc.data();
        const item = document.createElement('div');
        item.className = 'sensi-item bg-gray-900 p-4 rounded-lg flex items-center justify-between';
        item.setAttribute('data-name', data.name.toLowerCase());
        item.setAttribute('data-device', data.deviceName.toLowerCase());
        item.innerHTML = `
          <div class="flex items-center gap-4">
            <img src="${data.logoUrl}" class="w-12 h-12 rounded-full object-cover border-2 border-gray-700">
            <div>
              <p class="font-bold text-lg">${data.name}</p>
              <p class="text-sm text-gray-400">${data.deviceName}</p>
            </div>
          </div>
          <button data-id="${doc.id}" class="delete-btn bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded-lg">
            <i class="fa-solid fa-trash-alt"></i>
          </button>`;
        sensiList.appendChild(item);
      });
    };

    sensitivitiesCollection.orderBy('createdAt', 'desc').onSnapshot(snapshot => renderSensiList(snapshot.docs));

    sensiList.addEventListener('click', async (e) => {
      if (e.target.closest('.delete-btn')) {
        const btn = e.target.closest('.delete-btn');
        const id = btn.dataset.id;
        const name = btn.parentElement.querySelector('.font-bold').textContent;
        if (confirm(`Are you sure you want to delete "${name}"?`)) {
          try {
            await sensitivitiesCollection.doc(id).delete();
            alert('🗑️ Sensi deleted successfully!');
          } catch (err) {
            console.error(err);
            alert('❌ Error deleting sensi.');
          }
        }
      }
    });

    document.getElementById('search').addEventListener('keyup', (e) => {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.sensi-item').forEach(item => {
        const name = item.dataset.name;
        const device = item.dataset.device;
        item.style.display = (name.includes(term) || device.includes(term)) ? 'flex' : 'none';
      });
    });

    db.collection("requests").orderBy("time", "desc").onSnapshot(snapshot => {
      const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderRequests(data);
      document.getElementById("loading").classList.add("hidden");
    });

    function renderRequests(data) {
      const requestList = document.getElementById("request-list");
      requestList.innerHTML = "";
      if (data.length === 0) {
        requestList.innerHTML = `<div class='col-span-full text-center text-gray-400'>No requests yet.</div>`;
        return;
      }
      data.forEach(req => {
        requestList.innerHTML += `
          <div class="glow-card rounded-xl p-5">
            <h2 class="text-xl font-bold text-white mb-2">${req.name}</h2>
            <p class="text-gray-300 text-sm mb-1"><i class="fa-solid fa-mobile"></i> <strong>Device:</strong> ${req.device}</p>
            <p class="text-gray-400 text-sm mb-3"><strong>Message:</strong> ${req.message}</p>
            <p class="text-xs text-gray-500">Requested on: ${req.time?.toDate().toLocaleString() || "N/A"}</p>
            <button class="mt-3 px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
              <i class="fa-solid fa-upload mr-2"></i>Upload Sensi
            </button>
          </div>`;
      });
    }

    document.getElementById('requestBtn').addEventListener('click', () => {
      document.getElementById('requestModal').classList.remove('hidden');
    });
    function closeRequestModal() {
      document.getElementById('requestModal').classList.add('hidden');
    }
  </script></body>
</html>
